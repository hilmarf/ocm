name: "Flake.nix vendorHash updater"
on:
  push:
    branches: 
    - main
    paths:
    - go.mod
    - go.sum
  workflow_dispatch:
  workflow_call:
    
jobs:
  updateVendorHash:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Generate token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with: # OCMBot
          app_id: ${{ secrets.OCMBOT_APP_ID }}
          private_key: ${{ secrets.OCMBOT_PRIV_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: false
      - name: GPG version
        run: |
          gpg --version
      - name: Enable GPG signing
        run: |
          if [ -f /usr/lib/systemd/user/gpg-agent.service ]; then
            mkdir -p ~/.gnupg
            if [ -f ~/.gnupg/gpg-agent.conf ]; then
              TEMP_GPG_CONF=$(mktemp)
              # awk magic merging config files together, overriding duplicate
              awk 'NR==FNR{a[$1];if(NF&&$0!~/^#/) print $0;next} !($1 in a) && $1!~/^#/' \
                ${GITHUB_ACTION_PATH}/config/gpg-agent.conf \
                ~/.gnupg/gpg-agent.conf \
                > ${TEMP_GPG_CONF}
              mv ${TEMP_GPG_CONF} ~/.gnupg/gpg-agent.conf
            else
              echo "allow-preset-passphrase\ndefault-cache-ttl 60\nmax-cache-ttl 50" > ~/.gnupg/gpg-agent.conf
            fi
            chmod 600 ~/.gnupg/*
            chmod 700 ~/.gnupg
            systemctl --user restart gpg-agent
          else
            gpg-agent --daemon \
              --allow-preset-passphrase \
              --default-cache-ttl 60 \
              --max-cache-ttl 60
          fi
          echo "${{ secrets.OCMBOT_SIGNING_KEY_PASS }}" > passfile
          echo -n "${{ secrets.OCMBOT_SIGNING_KEY }}" | base64 --decode > signkey
          gpg --pinentry-mode loopback \
            --passphrase-file passfile \
            --import signkey
          rm passfile signkey
          GPG_FINGERPRINT=$( \
            gpg -K --with-fingerprint \
            | sed -n 4p \
            | sed -e 's/ *//g' \
          )
          echo "${GPG_FINGERPRINT}:6:" | gpg --import-ownertrust
          GPG_KEYGRIP=`gpg --with-keygrip -K \
            | sed -n '/[S]/{n;p}' \
            | sed 's/Keygrip = //' \
            | sed 's/ *//g'`
          GPG_PASSPHRASE_HEX=`echo -n "${{ secrets.OCMBOT_SIGNING_KEY_PASS }}" \
            | od -A n -t x1 \
            | tr -d ' ' | tr -d '\n'`
          echo "PRESET_PASSPHRASE $GPG_KEYGRIP -1 $GPG_PASSPHRASE_HEX" \
            | gpg-connect-agent
          export CI_SIGNINGKEY_ID=$( \
            gpg --list-signatures --with-colons \
            | grep 'sig' \
            | grep ${{ inputs.git-email }} \
            | head -n 1 \
            | cut -d':' -f5 \
          )
          git config --global user.name OCMBot
          git config --global user.email ocmbot@users.noreply.github.com
          git config --global user.signingkey $CI_SIGNINGKEY_ID
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12
      - name: Update ocm vendor hash
        run: nix run .#nixpkgs.nix-update -- --flake --version=skip ocm
      - name: Check diff and create action summary
        id: check-diff
        run: |
          diff=$(git diff)
          if [[ -z "$diff" ]]; then
            echo "Everything is tidy."
            exit 0
          fi
          cat << EOF >> "${GITHUB_STEP_SUMMARY}"
          \`\`\`diff
          ${diff}
          \`\`\`
          EOF
          cat << EOF >> body
          This PR updates the vendorHash in flake.nix.
          \`\`\`bash
          nix run .#nixpkgs.nix-update -- --flake --version=skip ocm
          \`\`\`
          \`\`\`diff
          ${diff}
          \`\`\`
          EOF
          echo "body=$(realpath body)" >> "$GITHUB_OUTPUT"
      - name: Create pull request
        id: create_pull_request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: update vendorHash
          title: Update vendorHash in flake.nix
          body-path: ${{ steps.check-diff.outputs.body }}
          body: |
            This PR updates the vendorHash in flake.nix.
            ```bash
            nix run .#nixpkgs.nix-update -- --flake --version=skip ocm
            ```          
          branch: nix/flake
          committer: OCMBot <ocmbot@users.noreply.github.com>
          author: OCMBot <ocmbot@users.noreply.github.com>
          # team-reviewers: ocm-dev
          add-paths: |
            flake.nix
            flake.lock
      - name: Enable pull request auto merge
        if: ${{ steps.create_pull_request.outputs.pull-request-number }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ steps.generate_token.outputs.token }}
          pull-request-number: ${{ steps.create_pull_request.outputs.pull-request-number }}
          merge-method: squash
