name: publish as latest
on:
  # publish on pushes to the main branch (image tagged as "latest")
  # https://ocm.software/ocm/pkgs/container/ocm
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - '**/*.mod'
      - '**/*.sum'
      - 'resources/**'

jobs:

  ocm-cli-latest:
    name: ocm-cli build latest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
    - name: Self Hosted Runner Post Job Cleanup Action
      uses: TooMuch4U/actions-clean@v2.2
    - name: Generate token
      id: generate_token
      uses: tibdex/github-app-token@v2
      with:
        app_id: ${{ secrets.OCMBOT_APP_ID }}
        private_key: ${{ secrets.OCMBOT_PRIV_KEY }}
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ steps.generate_token.outputs.token }}
    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ steps.generate_token.outputs.token }}
        custom_tag: ocm-cli/latest
        fetch_all_tags: true
        tag_prefix: ''
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: '${{ github.workspace }}/go.mod'
        check-latest: false
    - name: Run GoReleaser build
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: 2.2.0
        args: build --clean --timeout 60m --snapshot --verbose --skip=validate --config=.github/config/latest.yml
      env:
        GITHUBORG: ${{ github.repository_owner }}
        GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        GORELEASER_CURRENT_TAG: ocm-cli/latest
        GORELEASER_PREVIOUS_TAG: ocm-cli/latest
    - name: remove some files
      run: |
        rm -rf dist/*.json dist/*.yaml
    - name: Create Release
      uses: Hs1r1us/Release-AIO@v2.0.0
      env:
        GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
      with:
        tag_name: ocm-cli/latest
        release_name: latest ocm-cli
        asset_files: ./dist/
        body: |
          holds always the latest ocm-cli binaries
        draft: false
        prerelease: true
